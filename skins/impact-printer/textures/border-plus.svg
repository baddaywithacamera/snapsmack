<svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 36 36" shape-rendering="crispEdges">
  <!-- ASCII Plus: + everywhere — drawn as paths for crisp border-image rendering -->
  <g fill="none" stroke="#8a8275" stroke-width="1.0" stroke-linecap="square">
    <!-- Corner + at (6,6) -->
    <line x1="3" y1="6" x2="9" y2="6"/>
    <line x1="6" y1="3" x2="6" y2="9"/>
    <!-- Corner + at (30,6) -->
    <line x1="27" y1="6" x2="33" y2="6"/>
    <line x1="30" y1="3" x2="30" y2="9"/>
    <!-- Corner + at (6,30) -->
    <line x1="3" y1="30" x2="9" y2="30"/>
    <line x1="6" y1="27" x2="6" y2="33"/>
    <!-- Corner + at (30,30) -->
    <line x1="27" y1="30" x2="33" y2="30"/>
    <line x1="30" y1="27" x2="30" y2="33"/>
    <!-- Top/bottom edge + at (18,6) and (18,30) -->
    <line x1="15" y1="6" x2="21" y2="6"/>
    <line x1="18" y1="3" x2="18" y2="9"/>
    <line x1="15" y1="30" x2="21" y2="30"/>
    <line x1="18" y1="27" x2="18" y2="33"/>
    <!-- Left/right edge + at (6,18) and (30,18) -->
    <line x1="3" y1="18" x2="9" y2="18"/>
    <line x1="6" y1="15" x2="6" y2="21"/>
    <line x1="27" y1="18" x2="33" y2="18"/>
    <line x1="30" y1="15" x2="30" y2="21"/>
  </g>
</svg>

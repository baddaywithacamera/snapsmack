<svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 36 36" shape-rendering="crispEdges">
  <!-- ASCII Equals: = everywhere — drawn as paths for crisp border-image rendering -->
  <g fill="none" stroke="#8a8275" stroke-width="1.0" stroke-linecap="square">
    <!-- Corner = at (6,6) -->
    <line x1="3" y1="4" x2="9" y2="4"/>
    <line x1="3" y1="8" x2="9" y2="8"/>
    <!-- Corner = at (30,6) -->
    <line x1="27" y1="4" x2="33" y2="4"/>
    <line x1="27" y1="8" x2="33" y2="8"/>
    <!-- Corner = at (6,30) -->
    <line x1="3" y1="28" x2="9" y2="28"/>
    <line x1="3" y1="32" x2="9" y2="32"/>
    <!-- Corner = at (30,30) -->
    <line x1="27" y1="28" x2="33" y2="28"/>
    <line x1="27" y1="32" x2="33" y2="32"/>
    <!-- Top/bottom edge = at (18,6) and (18,30) -->
    <line x1="14" y1="4" x2="22" y2="4"/>
    <line x1="14" y1="8" x2="22" y2="8"/>
    <line x1="14" y1="28" x2="22" y2="28"/>
    <line x1="14" y1="32" x2="22" y2="32"/>
    <!-- Left/right edge = at (6,18) and (30,18) -->
    <line x1="3" y1="16" x2="9" y2="16"/>
    <line x1="3" y1="20" x2="9" y2="20"/>
    <line x1="27" y1="16" x2="33" y2="16"/>
    <line x1="27" y1="20" x2="33" y2="20"/>
  </g>
</svg>

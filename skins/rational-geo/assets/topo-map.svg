<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900">
  <!--
    SNAPSMACK – Rational Geo topographic background v2
    Denser cartographic detail for small-tile rendering (~480×360px).
    Western Canada: Rockies, prairies, rivers, lakes, township grid.
    Original artwork — no copyright encumbrance.
  -->
  <defs>
    <style>
      .grat       { stroke: #FFCC00; stroke-width: 0.5; fill: none; opacity: 0.18; }
      .twp        { stroke: #FFCC00; stroke-width: 0.25; fill: none; opacity: 0.08; stroke-dasharray: 2,6; }
      .c-maj      { stroke: #FFCC00; stroke-width: 1.0; fill: none; opacity: 0.22; }
      .c-med      { stroke: #FFCC00; stroke-width: 0.6; fill: none; opacity: 0.15; }
      .c-min      { stroke: #FFCC00; stroke-width: 0.35; fill: none; opacity: 0.10; }
      .c-fine     { stroke: #FFCC00; stroke-width: 0.25; fill: none; opacity: 0.07; }
      .river      { stroke: #FFCC00; stroke-width: 0.9; fill: none; opacity: 0.20; stroke-linecap: round; stroke-linejoin: round; }
      .river-sm   { stroke: #FFCC00; stroke-width: 0.5; fill: none; opacity: 0.14; stroke-linecap: round; }
      .creek      { stroke: #FFCC00; stroke-width: 0.3; fill: none; opacity: 0.09; stroke-linecap: round; }
      .lake       { stroke: #FFCC00; stroke-width: 0.7; fill: rgba(255,204,0,0.03); opacity: 0.18; }
      .lake-sm    { stroke: #FFCC00; stroke-width: 0.4; fill: rgba(255,204,0,0.02); opacity: 0.12; }
      .peak       { fill: #FFCC00; opacity: 0.22; }
      .boundary   { stroke: #FFCC00; stroke-width: 0.5; fill: none; opacity: 0.12; stroke-dasharray: 10,5,2,5; }
      .label      { font-family: 'Marcellus', 'Georgia', serif; fill: #FFCC00; opacity: 0.10; font-size: 9px; letter-spacing: 2px; }
      .label-sm   { font-family: 'DM Mono', monospace; fill: #FFCC00; opacity: 0.08; font-size: 6px; letter-spacing: 1px; }
      .elev       { font-family: 'DM Mono', monospace; fill: #FFCC00; opacity: 0.12; font-size: 7px; }
    </style>
  </defs>

  <!-- ═══════════ GRATICULE — lat/long lines ═══════════ -->

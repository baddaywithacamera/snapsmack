<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JIVE TURKEY — DAISY (prototype)</title>
<style>
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; background:#111; overflow:hidden; font-family:system-ui,sans-serif; }
  #c { position:fixed; inset:0; width:100%; height:100%; display:block; }
  #panel { position:fixed; left:14px; top:14px; z-index:10; background:rgba(20,20,20,.86); color:#eee; padding:14px 16px; border-radius:12px; font-size:13px; width:230px; backdrop-filter:blur(6px); box-shadow:0 8px 30px rgba(0,0,0,.5); }
  #panel h1 { font-size:14px; margin:0 0 10px; letter-spacing:.12em; color:#f4d03f; }
  #panel .row { margin:9px 0; }
  #panel label { display:block; margin-bottom:4px; opacity:.8; letter-spacing:.04em; text-transform:uppercase; font-size:10px; }
  #panel input[type=range] { width:100%; }
  .cw { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
  .cw button { padding:7px 4px; border:1px solid #444; background:#222; color:#ddd; border-radius:7px; cursor:pointer; font-size:11px; }
  .cw button.active { outline:2px solid #f4d03f; color:#fff; }
  .val { float:right; opacity:.6; }
  .tog { display:flex; gap:6px; align-items:center; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="panel">
  <h1>JIVE TURKEY · DAISY</h1>
  <div class="row"><label>Colourway</label><div class="cw" id="cw">
    <button data-k="BARF">BARF</button><button data-k="BLECH">BLECH</button>
    <button data-k="GROOVY">GROOVY</button><button data-k="HARVEST">HARVEST</button>
  </div></div>
  <div class="row"><label>Ray rotation speed <span class="val" id="vRay"></span></label><input id="ray" type="range" min="0" max="100" value="34"></div>
  <div class="row"><label>Flower float speed <span class="val" id="vFlo"></span></label><input id="flo" type="range" min="0" max="100" value="28"></div>
  <div class="row"><label>Rays <span class="val" id="vRays"></span></label><input id="rays" type="range" min="12" max="40" value="24"></div>
  <div class="row"><label>Ray swirl <span class="val" id="vSw"></span></label><input id="sw" type="range" min="0" max="100" value="45"></div>
  <div class="row"><label>Flower size <span class="val" id="vSz"></span></label><input id="sz" type="range" min="8" max="30" value="17"></div>
  <div class="row tog"><input type="checkbox" id="face" checked><label style="margin:0;text-transform:none;font-size:12px;">Smiley face</label></div>
</div>
<script>
const COLOURWAYS = {
  BARF:    { cream:'#efe7cf', colors:['#c9b23a','#6e7f39','#6b4a2a'], centre:'#c9b23a' },
  BLECH:   { cream:'#efe3cd', colors:['#6a3b86','#dd7328','#c39a3f'], centre:'#c39a3f' },
  GROOVY:  { cream:'#f2e7d6', colors:['#7b3f9e','#e368a4','#3f7cc4'], centre:'#e368a4' },
  HARVEST: { cream:'#f2e2c0', colors:['#d99a2b','#bd4e1f','#6b3f24'], centre:'#d99a2b' }
};
const INK = '#3a2a1a';
const S = { key:'HARVEST', ray:34, flo:28, rays:24, sw:45, sz:17, face:true };

const cv = document.getElementById('c'), ctx = cv.getContext('2d');
function resize(){ cv.width = window.innerWidth; cv.height = window.innerHeight; }
window.addEventListener('resize', resize); resize();

function rayCols(cw, N){
  const out=[]; let ci=0;
  for(let i=0;i<N;i++){ if(i%2===1) out.push(cw.cream); else { out.push(cw.colors[ci % cw.colors.length]); ci++; } }
  return out;
}

function drawFlower(x, y, R, cw, petalPhase){
  ctx.save(); ctx.translate(x,y);
  const P = 11;
  // petals cycle through the colourway colours + cream; the whole ring of
  // colours slowly rotates around the flower (petalPhase, tied to float speed).
  const petPal = cw.colors.concat([cw.cream]);
  const shift = Math.floor(petalPhase);
  ctx.strokeStyle = INK; ctx.lineWidth = Math.max(2, R*0.05); ctx.lineJoin='round';
  for(let i=0;i<P;i++){
    const a = (i/P)*Math.PI*2;
    ctx.save(); ctx.rotate(a);
    ctx.beginPath(); ctx.ellipse(0, -R*0.66, R*0.26, R*0.42, 0, 0, Math.PI*2);
    ctx.fillStyle = petPal[((i + shift) % petPal.length + petPal.length) % petPal.length]; ctx.fill(); ctx.stroke();
    ctx.restore();
  }
  // centre
  ctx.beginPath(); ctx.arc(0,0,R*0.46,0,Math.PI*2);
  ctx.fillStyle = cw.centre; ctx.fill(); ctx.stroke();
  if(S.face){
    ctx.fillStyle = INK;
    ctx.beginPath(); ctx.ellipse(-R*0.17,-R*0.08,R*0.06,R*0.09,0,0,7); ctx.fill();
    ctx.beginPath(); ctx.ellipse( R*0.17,-R*0.08,R*0.06,R*0.09,0,0,7); ctx.fill();
    ctx.beginPath(); ctx.lineWidth=Math.max(2,R*0.045); ctx.strokeStyle=INK;
    ctx.arc(0, R*0.02, R*0.22, 0.15*Math.PI, 0.85*Math.PI); ctx.stroke();
  }
  ctx.restore();
}

function draw(now){
  const t = now/1000;
  const cw = COLOURWAYS[S.key];
  const w=cv.width, h=cv.height;
  ctx.fillStyle = cw.cream; ctx.fillRect(0,0,w,h);

  const rs = (S.ray/100)*0.7;      // ray rotation speed
  const fs = (S.flo/100)*0.5;      // flower float speed
  const N = S.rays|0, seg = Math.PI*2/N;
  const curl = (S.sw/100) * 2.4;   // spiral curl (radians across radius)

  // floating flower centre (Lissajous within the frame)
  const fx = w*0.5 + Math.sin(t*fs)*w*0.24;
  const fy = h*0.5 + Math.sin(t*fs*1.3 + 1.0)*h*0.26;
  const R = Math.hypot(w,h)*1.05;  // rays reach past edges even when centre drifts

  const cols = rayCols(cw, N);
  const rot = t*rs;
  const steps = 26;
  ctx.save(); ctx.translate(fx, fy);
  for(let i=0;i<N;i++){
    ctx.fillStyle = cols[i];
    ctx.beginPath();
    ctx.moveTo(0,0);
    for(let s=0;s<=steps;s++){ const r=(s/steps)*R; const a=rot + i*seg + curl*(r/R); ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r); }
    for(let s=steps;s>=0;s--){ const r=(s/steps)*R; const a=rot + (i+1)*seg + curl*(r/R); ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r); }
    ctx.closePath(); ctx.fill();
  }
  ctx.restore();

  drawFlower(fx, fy, Math.min(w,h)*(S.sz/100), cw, t*fs);   // petal colour ring shifts at the float speed
  requestAnimationFrame(draw);
}

function labels(){ vRay.textContent=S.ray; vFlo.textContent=S.flo; vRays.textContent=S.rays; vSw.textContent=S.sw; vSz.textContent=S.sz; }
document.querySelectorAll('#cw button').forEach(b=>{ b.onclick=()=>{S.key=b.dataset.k; document.querySelectorAll('#cw button').forEach(x=>x.classList.toggle('active',x===b));}; if(b.dataset.k===S.key)b.classList.add('active'); });
const bind=(id,p)=>{ const el=document.getElementById(id); el.value=S[p]; el.oninput=()=>{S[p]=+el.value; labels();}; };
bind('ray','ray'); bind('flo','flo'); bind('rays','rays'); bind('sw','sw'); bind('sz','sz');
document.getElementById('face').onchange=e=>{S.face=e.target.checked;};
labels();
requestAnimationFrame(draw);
window.__set = k => { S.key=k; document.querySelectorAll('#cw button').forEach(x=>x.classList.toggle('active',x.dataset.k===k)); };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JIVE TURKEY — REELS (prototype)</title>
<style>
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; background:#111; overflow:hidden; font-family:system-ui,sans-serif; }
  #c { position:fixed; inset:0; width:100%; height:100%; display:block; }
  #panel { position:fixed; left:14px; top:14px; z-index:10; background:rgba(20,20,20,.86); color:#eee; padding:14px 16px; border-radius:12px; font-size:13px; width:230px; backdrop-filter:blur(6px); box-shadow:0 8px 30px rgba(0,0,0,.5); }
  #panel h1 { font-size:14px; margin:0 0 10px; letter-spacing:.12em; color:#f4d03f; }
  #panel .row { margin:9px 0; }
  #panel label { display:block; margin-bottom:4px; opacity:.8; letter-spacing:.04em; text-transform:uppercase; font-size:10px; }
  #panel input[type=range] { width:100%; }
  .cw { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
  .cw button { padding:7px 4px; border:1px solid #444; background:#222; color:#ddd; border-radius:7px; cursor:pointer; font-size:11px; }
  .cw button.active { outline:2px solid #f4d03f; color:#fff; }
  .val { float:right; opacity:.6; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="panel">
  <h1>JIVE TURKEY · REELS</h1>
  <div class="row"><label>Colourway</label><div class="cw" id="cw">
    <button data-k="BARF">BARF</button><button data-k="BLECH">BLECH</button>
    <button data-k="GROOVY">GROOVY</button><button data-k="HARVEST">HARVEST</button>
  </div></div>
  <div class="row"><label>Shuffle speed <span class="val" id="vSpd"></span></label><input id="spd" type="range" min="0" max="100" value="40"></div>
  <div class="row"><label>Cell size <span class="val" id="vCell"></span></label><input id="cell" type="range" min="70" max="200" value="110"></div>
  <div class="row"><label>Spin on flip <span class="val" id="vSpin"></span></label><input id="spin" type="range" min="0" max="100" value="55"></div>
  <div class="row"><label>Busyness <span class="val" id="vBusy"></span></label><input id="busy" type="range" min="6" max="60" value="26"></div>
  <div class="row"><label>Shift direction</label><select id="dir" style="width:100%;padding:5px;background:#222;color:#ddd;border:1px solid #444;border-radius:6px;font-size:12px;">
    <option value="ltr">Left → right</option><option value="rtl">Right → left</option>
    <option value="ttb">Top → bottom</option><option value="btt">Bottom → top</option>
    <option value="dtlbr" selected>Diagonal ↘</option><option value="dbrtl">Diagonal ↖</option>
  </select></div>
</div>
<script>
const COLOURWAYS = {
  BARF:    { cream:'#efe7cf', colors:['#c9b23a','#6e7f39','#6b4a2a'], dark:'#40301c' },
  BLECH:   { cream:'#efe3cd', colors:['#6a3b86','#dd7328','#c39a3f'], dark:'#33223e' },
  GROOVY:  { cream:'#f2e7d6', colors:['#7b3f9e','#e368a4','#3f7cc4'], dark:'#2b2340' },
  HARVEST: { cream:'#f2e2c0', colors:['#d99a2b','#bd4e1f','#6b3f24'], dark:'#38220f' }
};
const S = { key:'HARVEST', spd:40, cell:110, spin:55, busy:26, dir:'dtlbr' };
// AURORA/PARADE wave directions → per-cell order value
function orderVal(dir, r, c, rows, cols){
  switch(dir){
    case 'ltr': return c;
    case 'rtl': return (cols-1-c);
    case 'ttb': return r;
    case 'btt': return (rows-1-r);
    case 'dbrtl': return (rows-1-r)+(cols-1-c);
    default: return r+c; // dtlbr ↘
  }
}
const cv = document.getElementById('c'), ctx = cv.getContext('2d');
function resize(){ cv.width=window.innerWidth; cv.height=window.innerHeight; }
window.addEventListener('resize', resize); resize();

function rnd(s){ const x=Math.sin(s*127.1)*43758.5453; return x-Math.floor(x); }

// deterministic shape for (cell index, cycle number)
function shapeFor(idx, cyc, pal){
  const s = idx*13.1 + cyc*57.7;
  const type = ['solid','split','stripe','semi','split'][Math.floor(rnd(s)*5)];
  let a = Math.floor(rnd(s+1)*pal.length);
  let b = (a + 1 + Math.floor(rnd(s+2)*(pal.length-1))) % pal.length;
  const rot = Math.floor(rnd(s+3)*4);   // 0..3 → *90°
  const spin = rnd(s+4) < 0.5 ? 1 : -1;
  return { type, colA:pal[a], colB:pal[b], rot, spin };
}

function drawCell(cx, cy, D, sh, sc, extraRot, dark){
  const R = D*0.5;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(sc, sc);
  ctx.rotate(sh.rot*Math.PI/2 + extraRot);
  // clip to the cell's circle
  ctx.beginPath(); ctx.arc(0,0,R,0,Math.PI*2); ctx.clip();
  if(sh.type==='solid'){
    ctx.fillStyle=sh.colA; ctx.beginPath(); ctx.arc(0,0,R,0,7); ctx.fill();
  } else if(sh.type==='split'){
    ctx.fillStyle=sh.colB; ctx.fillRect(-R,-R,2*R,2*R);
    ctx.fillStyle=sh.colA; ctx.fillRect(-R,-R,2*R,R);            // top half
  } else if(sh.type==='semi'){
    ctx.fillStyle=dark; ctx.fillRect(-R,-R,2*R,2*R);            // half stays field → half-circle
    ctx.fillStyle=sh.colA; ctx.fillRect(-R,-R,2*R,R);
  } else { // stripe — no more than HALF the circle is striped (rot rotates which half)
    ctx.fillStyle=sh.colA; ctx.fillRect(-R,-R,2*R,2*R);
    ctx.save(); ctx.beginPath(); ctx.rect(-R, 0, 2*R, R); ctx.clip();   // confine stripes to one semicircle
    ctx.fillStyle=sh.colB; const n=3, band=R/(n*2);
    for(let i=0;i<n;i++){ ctx.fillRect(-R, (i*2+0.5)*band, 2*R, band); }
    ctx.restore();
  }
  ctx.restore();
}

let __last = 0;
function draw(now){
  if(now - __last < 32){ requestAnimationFrame(draw); return; }   // cap ~30fps so the panel stays responsive
  __last = now;
  const t = now/1000;
  const cw = COLOURWAYS[S.key];
  const pal = cw.colors.concat([cw.cream]);
  const w=cv.width, h=cv.height;
  ctx.fillStyle = cw.dark; ctx.fillRect(0,0,w,h);

  const D = S.cell|0;
  const cols = Math.ceil(w/D), rows = Math.ceil(h/D);
  const ox = (w - cols*D)/2, oy = (h - rows*D)/2;
  const spd = 0.15 + (S.spd/100)*0.9;        // higher = faster shuffle
  const spinAmt = (S.spin/100) * Math.PI;    // up to 180° flip
  const busy = S.busy;                        // avg seconds range spreads timers

  for(let gy=0; gy<rows; gy++){
    for(let gx=0; gx<cols; gx++){
      const idx = gy*cols + gx;
      const busyF = Math.max(0.2, busy/30);              // slider ↑ = busier (shorter dwell)
      const period = (4.0 + rnd(idx*2.7)*4.0) / busyF;   // per-cell dwell; left=calm, right=busy
      const offset = orderVal(S.dir, gy, gx, rows, cols)*0.16 + rnd(idx*5.3)*0.22;
      const local = t*spd/period + offset;
      const cyc = Math.floor(local);
      const f = local - cyc;
      let sc, shownCyc, prog;
      if(f < 0.86){ sc=1; shownCyc=cyc; prog=0; }
      else if(f < 0.93){ prog=(f-0.86)/0.07; sc=1-prog; shownCyc=cyc; }   // blink out
      else { prog=(f-0.93)/0.07; sc=prog; shownCyc=cyc+1; }               // new one blinks in
      if(sc<=0.001) continue;
      const sh = shapeFor(idx, shownCyc, pal);
      const extraRot = (1-sc) * spinAmt * sh.spin;       // spin during the flip
      drawCell(ox + gx*D + D/2, oy + gy*D + D/2, D, sh, Math.max(0,sc), extraRot, cw.dark);
    }
  }
  requestAnimationFrame(draw);
}

function labels(){ vSpd.textContent=S.spd; vCell.textContent=S.cell; vSpin.textContent=S.spin; vBusy.textContent=S.busy; }
document.querySelectorAll('#cw button').forEach(b=>{ b.onclick=()=>{S.key=b.dataset.k; document.querySelectorAll('#cw button').forEach(x=>x.classList.toggle('active',x===b));}; if(b.dataset.k===S.key)b.classList.add('active'); });
const bind=(id,p)=>{ const el=document.getElementById(id); el.value=S[p]; el.oninput=()=>{S[p]=+el.value; labels();}; };
bind('spd','spd'); bind('cell','cell'); bind('spin','spin'); bind('busy','busy');
document.getElementById('dir').onchange=e=>{S.dir=e.target.value;};
labels();
requestAnimationFrame(draw);
window.__set = k => { S.key=k; document.querySelectorAll('#cw button').forEach(x=>x.classList.toggle('active',x.dataset.k===k)); };
</script>
</body>
</html>

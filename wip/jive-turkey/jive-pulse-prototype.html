<!DOCTYPE html>
<!-- SNAPSMACK_EOF_HEADER: last non-empty line must be the SNAPSMACK EOF comment. -->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JIVE TURKEY — OUTWARD PULSE border (prototype)</title>
<style>
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; overflow:hidden; font-family:system-ui,sans-serif; }
  #stage { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
  #grid { display:grid; grid-template-columns:repeat(3,1fr); gap:54px; width:min(720px,64vw); }
  /* faux-instamatic tile: white print frame around the photo, heavier bottom lip */
  .jt-tile { position:relative; aspect-ratio:1; background:#fff; padding:10px 10px 30px;
             box-shadow:0 6px 16px rgba(0,0,0,.22); border-radius:2px; }
  .jt-tile .photo { width:100%; height:100%; background:linear-gradient(135deg,#9c9488,#6f685c); }
  #panel { position:fixed; left:14px; top:14px; z-index:10; background:rgba(20,20,20,.86); color:#eee; padding:14px 16px; border-radius:12px; font-size:13px; width:230px; backdrop-filter:blur(6px); box-shadow:0 8px 30px rgba(0,0,0,.5); }
  #panel h1 { font-size:13px; margin:0 0 10px; letter-spacing:.1em; color:#f4d03f; }
  #panel .row { margin:9px 0; }
  #panel label { display:block; margin-bottom:4px; opacity:.8; letter-spacing:.04em; text-transform:uppercase; font-size:10px; }
  #panel input[type=range] { width:100%; }
  .cw { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
  .cw button { padding:7px 4px; border:1px solid #444; background:#222; color:#ddd; border-radius:7px; cursor:pointer; font-size:11px; }
  .cw button.active { outline:2px solid #f4d03f; color:#fff; }
  .val { float:right; opacity:.6; }
</style>
</head>
<body>
<div id="stage"><div id="grid"></div></div>
<div id="panel">
  <h1>JIVE TURKEY · OUTWARD PULSE</h1>
  <div class="row"><label>Colourway</label><div class="cw" id="cw">
    <button data-k="BARF">BARF</button><button data-k="BLECH">BLECH</button>
    <button data-k="GROOVY">GROOVY</button><button data-k="HARVEST">HARVEST</button>
  </div></div>
  <div class="row"><label>Pulse speed <span class="val" id="vSpd"></span></label><input id="spd" type="range" min="0" max="100" value="55"></div>
  <div class="row"><label>Reach (px) <span class="val" id="vReach"></span></label><input id="reach" type="range" min="6" max="40" value="22"></div>
  <div class="row"><label>Ring thickness <span class="val" id="vThick"></span></label><input id="thick" type="range" min="2" max="14" value="7"></div>
  <div class="row"><label>Wave stagger <span class="val" id="vWave"></span></label><input id="wave" type="range" min="0" max="100" value="45"></div>
  <div class="row"><label>Rings (ripples) <span class="val" id="vRings"></span></label><input id="rings" type="range" min="1" max="3" value="2"></div>
  <div class="row"><label>Direction</label><select id="dir" style="width:100%;padding:5px;background:#222;color:#ddd;border:1px solid #444;border-radius:6px;font-size:12px;">
    <option value="ltr">Left → right</option><option value="rtl">Right → left</option>
    <option value="ttb">Top → bottom</option><option value="btt">Bottom → top</option>
    <option value="dtlbr" selected>Diagonal ↘</option><option value="dbrtl">Diagonal ↖</option>
  </select></div>
</div>
<script>
const COLOURWAYS = {
  BARF:    { cream:'#efe7cf', colors:['#c9b23a','#6e7f39','#6b4a2a'] },
  BLECH:   { cream:'#efe3cd', colors:['#6a3b86','#dd7328','#c39a3f'] },
  GROOVY:  { cream:'#f2e7d6', colors:['#7b3f9e','#e368a4','#3f7cc4'] },
  HARVEST: { cream:'#f2e2c0', colors:['#d99a2b','#bd4e1f','#6b3f24'] }
};
const S = { key:'HARVEST', spd:55, reach:22, thick:7, wave:45, rings:2, dir:'dtlbr' };
const COLS=3, ROWS=3;
function orderVal(dir,r,c,rows,cols){switch(dir){case 'ltr':return c;case 'rtl':return cols-1-c;case 'ttb':return r;case 'btt':return rows-1-r;case 'dbrtl':return (rows-1-r)+(cols-1-c);default:return r+c;}}
function rgba(hex,a){hex=hex.replace('#','');if(hex.length===3)hex=hex.split('').map(x=>x+x).join('');const r=parseInt(hex.slice(0,2),16),g=parseInt(hex.slice(2,4),16),b=parseInt(hex.slice(4,6),16);return `rgba(${r},${g},${b},${a.toFixed(3)})`;}

const grid=document.getElementById('grid'); const tiles=[];
for(let gy=0;gy<ROWS;gy++)for(let gx=0;gx<COLS;gx++){const d=document.createElement('div');d.className='jt-tile';d.innerHTML='<div class="photo"></div>';grid.appendChild(d);tiles.push({el:d,gx,gy});}
function applyBg(){document.body.style.background=COLOURWAYS[S.key].cream;}

// Each tile emits outward-expanding coloured rings from its edge (box-shadow spread),
// growing 0 -> reach while fading, cycling the colourway colours, staggered as a wave.
function frame(now){
  const t=now/1000, cw=COLOURWAYS[S.key], cols=cw.colors;
  const period = 0.6 + Math.pow((100-S.spd)/100,2)*3.4;   // seconds per pulse
  const waveAmt=(S.wave/100)*0.9;
  for(const tile of tiles){
    const off=orderVal(S.dir,tile.gy,tile.gx,ROWS,COLS)*waveAmt;
    const local=t/period+off;
    const shadows=[];
    for(let k=0;k<S.rings;k++){
      const phase=((local - k*0.34)%1+1)%1;             // stagger the ripples
      const spread=phase*S.reach;                        // grow outward
      const alpha=Math.pow(1-phase,1.4)*0.9;             // fade as it expands
      const ci=Math.floor(local - k*0.34);               // colour advances each pulse
      const col=cols[((ci%cols.length)+cols.length)%cols.length];
      // ring = outer solid shadow minus an inner one of the same size-thickness
      shadows.push(`0 0 0 ${(spread+S.thick).toFixed(1)}px ${rgba(col,alpha)}`);
      shadows.push(`0 0 0 ${spread.toFixed(1)}px rgba(0,0,0,0)`);
    }
    // keep the print drop-shadow underneath
    shadows.push('0 6px 16px rgba(0,0,0,.22)');
    tile.el.style.boxShadow=shadows.join(',');
  }
  requestAnimationFrame(frame);
}
function labels(){vSpd.textContent=S.spd;vReach.textContent=S.reach;vThick.textContent=S.thick;vWave.textContent=S.wave;vRings.textContent=S.rings;}
document.querySelectorAll('#cw button').forEach(b=>{b.onclick=()=>{S.key=b.dataset.k;applyBg();document.querySelectorAll('#cw button').forEach(x=>x.classList.toggle('active',x===b));};if(b.dataset.k===S.key)b.classList.add('active');});
const bind=(id,p)=>{const el=document.getElementById(id);el.value=S[p];el.oninput=()=>{S[p]=+el.value;labels();};};
bind('spd','spd');bind('reach','reach');bind('thick','thick');bind('wave','wave');bind('rings','rings');
document.getElementById('dir').onchange=e=>{S.dir=e.target.value;};
applyBg();labels();requestAnimationFrame(frame);
window.__set=k=>{S.key=k;applyBg();document.querySelectorAll('#cw button').forEach(x=>x.classList.toggle('active',x.dataset.k===k));};
</script>
</body>
</html>
